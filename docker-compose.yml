services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - club-manager-network
    restart: unless-stopped
  
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    environment:
      DB_URL: "postgres://${DB_USER}:${DB_PASSWORD}@${DB_SERVICE}:5432/${DB_NAME}?sslmode=disable"
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck: 
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    networks:
      - club-manager-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U club_manager -d clubmanager_db"]
      interval: 5s 
      timeout: 5s 
      retries: 5 
    networks:
      - club-manager-network
    restart: unless-stopped 

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - club-manager-network
    restart: unless-stopped

volumes:
  db-data:

networks:
  club-manager-network:
    driver: bridge
