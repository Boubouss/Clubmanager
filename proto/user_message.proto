syntax = "proto3";

package proto;

option go_package = "clubmanager/api/grpc/proto;proto";

message CreateUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string phonenumber = 4;
}

message CreateUserResponse {
  string id = 1;
  string username = 2;
  string token = 3;
  map<string, string> errors = 4;
}
